# SOPS encryption rules para greencode-metrics secrets.
#
# Encriptacion: age (https://github.com/FiloSottile/age).
# La private key vive en:
#   - 1Password / vault compartido del equipo (autoridad)
#   - ~/.config/sops/age/keys.txt en la maquina del lider tecnico
#   - /etc/sops/age/keys.txt en el droplet productivo (transferida via SCP una vez)
#
# La public key (la linea de abajo en `age:`) es publica y va commiteada.
#
# Para encriptar:    sops -e secrets/prod.env > secrets/prod.env.sops
# Para desencriptar: sops -d secrets/prod.env.sops > /tmp/.env
#                    (requiere SOPS_AGE_KEY_FILE=~/.config/sops/age/keys.txt)
#
# Rotar la age key:
#   1) generar pareja nueva: age-keygen -o ~/.config/sops/age/keys-new.txt
#   2) editar este .sops.yaml con la nueva public key (mantener la vieja como segunda
#      recipient para no quedarse sin acceso si algo falla)
#   3) sops updatekeys secrets/prod.env.sops
#   4) cuando todo este verificado y el droplet recibio la key nueva, sacar la vieja
#      del .sops.yaml y volver a updatekeys.

creation_rules:
  - path_regex: ^secrets/prod\.env$
    age: 'age1ekalspnrt5nvgv9pk7dv0p8tujhvu2hfysrgyyngz7vw9qysvd6s6n3qfa'
