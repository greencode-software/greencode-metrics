# Baselines por proyecto: fecha de adopcion de IA para cohort analysis.
#
# Ver docs/CONVENTIONS.md §4 para la definicion del criterio.
#
# Schema:
#   project:            nombre canonico del project en DevLake (kebab-case)
#   ai_adoption_start:  fecha ISO YYYY-MM-DD desde la cual el equipo adopta IA
#                       de forma sistematica. null si aun no adoptado.
#   ai_adoption_end:    (opcional) fecha en la que dejo de usarse, con motivo.
#   notes:              contexto humano: que herramienta, quien lo confirmo, etc.

- project: tallone-sistema-de-gestion
  ai_adoption_start: null   # TODO: confirmar fecha con elamonica
  notes: "Pendiente de definir. Probablemente Q1 2026 cuando se sumo Claude Code."

- project: pinvest-platform
  ai_adoption_start: 2026-05-08   # = creacion del repo; IA usada desde el origen
  notes: "Repo greencode-software/pinvest (Ruby) creado 2026-05-08 y desarrollado
    con IA desde el dia cero (confirmado por elamonica). Toda la historia del
    proyecto es cohorte post-IA; no hay ventana pre-IA para comparar."
